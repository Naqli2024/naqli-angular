<nav class="navbar">
  <div class="container">
    <!-- Brand/logo -->
    <a class="navbar-brand" href="#">
      <img src="assets/images/naqlee-logo.svg"/>
    </a>

    <!-- Centered Links -->
    <div class="centered-links" (click)="logout()">
      <a [routerLink]="'/home/user'" routerLinkActive="active" class="nav-link" 
        >User</a
      >
      <span class="vertical-line"></span>
      <a
        [routerLink]="'/home/partner'"
        routerLinkActive="active"
        class="nav-link"
        >Partner</a
      >
    </div>

    <!-- Navbar right-side elements -->
    <div class="right-side-elements">
      <div class="dropdown">
        <button class="dropbtn" (click)="toggleDropdown()">
          {{ selectedLanguage }} ▼
        </button>
        <div class="dropdown-content" [class.show]="isDropdownOpen">
          <a href="#" class="dropdown-item" (click)="selectLanguage('English')"
            >English</a
          >
          <a href="#" class="dropdown-item" (click)="selectLanguage('Tamil')"
            >Tamil</a
          >
        </div>
      </div>
      <button
        *ngIf="!isAuthenticated"
        type="button"
        class="btn"
        (click)="openLoginModal()"
      >
        Login
      </button>
      <button *ngIf="isAuthenticated" type="button" class="btn">
        {{ firstName }} {{ lastName }} {{ partnerName }}
      </button>
      <div class="notification-icon">
        <i class="fa fa-bell" aria-hidden="true"></i>
      </div>
      <button
        *ngIf="isAuthenticated"
        type="button"
        class="btn"
        (click)="logout()"
      >
        Logout
      </button>
    </div>

    <!-- Hamburger Menu Button -->
    <button class="hamburger" (click)="toggleMenu()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>

  <!-- Hamburger menu content -->
  <div class="hamburger-menu" [class.active]="isMenuOpen">
    <a [routerLink]="'/home/user'" routerLinkActive="active" class="nav-link"
      >User</a
    >
    <a [routerLink]="'/home/partner'" routerLinkActive="active" class="nav-link"
      >Partner</a
    >
    <div class="dropdown">
      <button class="dropbtn" (click)="toggleDropdown()">
        {{ selectedLanguage }} ▼
      </button>
      <div class="dropdown-content" [class.show]="isDropdownOpen">
        <a href="#" class="dropdown-item" (click)="selectLanguage('English')"
          >English</a
        >
        <a href="#" class="dropdown-item" (click)="selectLanguage('Tamil')"
          >Tamil</a
        >
      </div>
    </div>
    <button
        *ngIf="!isAuthenticated"
        type="button"
        class="btn"
        (click)="openLoginModal()"
      >
        Login
      </button>
      <button *ngIf="isAuthenticated" type="button" class="btn">
        {{ partnerName }} || {{ firstName }} {{ lastName }} 
      </button>
      <div class="notification-icon">
        <i class="fa fa-bell" aria-hidden="true"></i>
      </div>
      <button
        *ngIf="isAuthenticated"
        type="button"
        class="btn"
        (click)="logout()"
      >
        Logout
      </button>
  </div>
</nav>
