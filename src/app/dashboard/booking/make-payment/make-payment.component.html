<div class="dashboard-booking-container">
  <div class="row">
    <div class="col-md-7 left-div">
      <div class="left-div-title">
        <img src="assets/images/delivery-truck.svg" />
        <p>Booking Id #########</p>
      </div>
    </div>
    <div class="col-md-5 right-div">
      <div class="input-container">
        <div class="vendor-info">
            <p>Vendor Name <span>Kamado</span></p>
            <p>Operator ID <span>12345</span></p>
            <p>Operator Name <span>John Doe</span></p>
            <p>Mode <span>Online</span></p>
            <p>No. of Units <span>10</span></p>
            <p>Booking Status <span>Confirmed</span></p>
          </div>
          <div class="vendor-info-last">
            <h2>Pending Amount</h2>
            <p>XXXX SAR</p>
          </div>
        <div class="modal-footer cancel-booking-btns">
          <button
            type="button"
            class="btn btn-pay-advance"
            (click)="paymentSuccessfulModal($event)"
            style="margin-top: 14px !important;"
          >
            PAY NOW
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
